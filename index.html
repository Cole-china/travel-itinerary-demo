<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>行程日历 · Malaysia Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --panel: rgba(255, 255, 255, 0.82);
      --ink: #0f172a;
      --muted: #6b7280;
      --line: rgba(15, 23, 42, 0.12);
      --accent: #1b4bff;
      --accent-2: #0ea5e9;
      --shadow: 0 14px 45px rgba(15, 23, 42, 0.14);
      --radius-lg: 18px;
      --radius-sm: 12px;
      --glass: blur(16px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --panel: rgba(13, 19, 35, 0.8);
        --ink: #e5e7eb;
        --muted: #94a3b8;
        --line: rgba(148, 163, 184, 0.16);
        --accent: #4f8bff;
        --accent-2: #22d3ee;
        --shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Manrope', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 15% 20%, rgba(34,197,235,0.12), transparent 30%),
                  radial-gradient(circle at 85% 10%, rgba(27,75,255,0.16), transparent 32%),
                  radial-gradient(circle at 50% 90%, rgba(14,165,233,0.12), transparent 30%),
                  var(--bg);
      color: var(--ink);
      line-height: 1.6;
      padding: 18px;
      max-width: 1200px;
      margin-inline: auto;
    }
    header { position: sticky; top: 0; z-index: 20; backdrop-filter: var(--glass); background: color-mix(in srgb, var(--bg) 80%, transparent); border-bottom: 1px solid var(--line); padding: 16px 0 12px; margin-bottom: 10px; }
    .hero { background: linear-gradient(120deg, rgba(27,75,255,0.9), rgba(14,165,233,0.9)); color: #fff; padding: 22px 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow); display: grid; gap: 12px; }
    .hero h1 { margin: 0; font-family: 'Playfair Display', serif; letter-spacing: 0.4px; font-size: 1.6rem; }
    .hero p { margin: 0; color: rgba(255,255,255,0.88); }
    .legend { color: rgba(255,255,255,0.82); font-size: 0.9rem; }
    .nav { display: flex; gap: 8px; overflow-x: auto; padding: 10px 2px 6px 0; scrollbar-width: thin; margin-top: 6px; }
    .chip { border: 1px solid var(--line); padding: 8px 12px; border-radius: 999px; background: var(--panel); color: var(--ink); white-space: nowrap; box-shadow: 0 10px 30px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease; }
    .chip:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .chip.active { border-color: var(--accent); color: var(--accent); font-weight: 700; }

    main { margin-top: 14px; display: grid; gap: 14px; }
    .day { background: var(--panel); border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--line); box-shadow: var(--shadow); display: grid; gap: 12px; }
    .day-header { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .day-title { margin: 0; font-size: 1.05rem; font-weight: 800; }
    .day-date { color: var(--muted); font-weight: 600; }
    .day-meta { color: var(--muted); font-size: 0.94rem; }

    .img-wrap { border-radius: 14px; overflow: hidden; border: 1px solid var(--line); height: 220px; background: #e5e7eb; }
    .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .grid-items { display: grid; gap: 10px; }
    @media (min-width: 820px) { .grid-items { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); } }

    .item { border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px; background: color-mix(in srgb, var(--panel) 88%, rgba(27,75,255,0.05) 12%); display: grid; gap: 8px; position: relative; overflow: hidden; }
    .item::after { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 55%, rgba(27,75,255,0.06)); pointer-events: none; }
    .time { font-weight: 800; color: var(--accent); font-size: 0.96rem; }
    .title { font-size: 1rem; font-weight: 800; margin: 0; }
    .meta { color: var(--muted); font-size: 0.94rem; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; background: color-mix(in srgb, var(--accent) 16%, var(--panel) 84%); color: var(--accent); padding: 4px 8px; border-radius: 999px; font-size: 0.82rem; font-weight: 700; }
    .desc { color: var(--ink); font-size: 0.94rem; }
    .rating { font-weight: 800; color: var(--accent-2); }
    .thumb { border-radius: 10px; overflow: hidden; height: 120px; border: 1px solid var(--line); background: #e2e8f0; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .btn-link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 10px; background: color-mix(in srgb, var(--accent) 12%, var(--panel) 88%); color: var(--accent); border: 1px solid var(--line); text-decoration: none; font-weight: 800; transition: transform 0.12s ease; }
    .btn-link:hover { transform: translateY(-1px); }
    .map-frame { margin-top: 8px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; display: none; }
    .map-frame iframe { width: 100%; height: 220px; border: none; display: block; }
  </style>
</head>
<body>
  <header>
    <div class="hero">
      <div>
        <h1>Malaysia Group · 广深穗 行程</h1>
        <p>3/20 - 3/27 · 挥杆 / 童梦 / 商务 · 纯前端 / 移动优先</p>
        <p class="legend">提示：顶部日期可跳转；行程卡可打开地图；图片为真实场景（公共素材近似地点）。</p>
      </div>
      <div class="nav" id="dayNav"></div>
    </div>
  </header>

  <main id="days"></main>

  <script>
    const q = encodeURIComponent;
    const mapEmbed = place => `https://www.google.com/maps?q=${q(place)}&output=embed`;

    const IMAGES = {
      airport: "https://images.unsplash.com/photo-1504198266285-165a02f317c2?auto=format&fit=crop&w=1400&q=80",
      shangrila_sz: "https://images.unsplash.com/photo-1501117716987-c8e1ecb210af?auto=format&fit=crop&w=1400&q=80",
      yunjing: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=1400&q=80",
      xiaoxiu_golf: "https://images.unsplash.com/photo-1508766206392-8bd5cf550d1b?auto=format&fit=crop&w=1400&q=80",
      foot_massage: "https://images.unsplash.com/photo-1556228720-195a672e8a03?auto=format&fit=crop&w=1400&q=80",
      rongyuan: "https://images.unsplash.com/photo-1421622548261-c45bfe178854?auto=format&fit=crop&w=1400&q=80",
      haiyi_golf: "https://images.unsplash.com/photo-1518607692857-bff9babd9d87?auto=format&fit=crop&w=1400&q=80",
      shangrila_gz: "https://images.unsplash.com/photo-1472220625704-91e1462799b2?auto=format&fit=crop&w=1400&q=80",
      yueyan: "https://images.unsplash.com/photo-1529193591184-b1d58069ecdd?auto=format&fit=crop&w=1400&q=80",
      changlong_zoo: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1400&q=80",
      changlong_circus: "https://images.unsplash.com/photo-1457972580121-0a23a3c91800?auto=format&fit=crop&w=1400&q=80",
      science: "https://images.unsplash.com/photo-1473186578172-c141e6798cf4?auto=format&fit=crop&w=1400&q=80",
      foshan_golf: "https://images.unsplash.com/photo-1506169894395-36397e4aa1f2?auto=format&fit=crop&w=1400&q=80",
      aquarium: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1400&q=80",
      museum: "https://images.unsplash.com/photo-1529429617124-aee1f1650a5a?auto=format&fit=crop&w=1400&q=80",
      summer_palace: "https://images.unsplash.com/photo-1544145945-f90425340c7c?auto=format&fit=crop&w=1400&q=80",
      baiyun_airport: "https://images.unsplash.com/photo-1421167418805-7f170a738ebc?auto=format&fit=crop&w=1400&q=80"
    };

    const schedule = [
      {
        date: "2026-03-20",
        label: "Day 1 · 抵达广州→深圳",
        summary: "MH376 抵达广州，转场深圳，云璟晚餐",
        cover: IMAGES.airport,
        items: [
          { time: "抵达", title: "航班 MH376 抵达广州白云 → 深圳", transport: "2 辆商务车接机，转场南山香格里拉", note: "12人：Mr Yong、Mary、Datuk Richard、Datin Richard、Datuk Lim、Datin Lim、Hao Ge、Mrs. Li、Moli、Moga、Mark、Mini", tags:["抵达","接驳"], img: IMAGES.airport, map: mapEmbed('广州白云机场') },
          { time: "入住", title: "深圳南山香格里拉酒店", note: "抵达后入住", tags:["酒店"], img: IMAGES.shangrila_sz },
          { time: "晚餐", title: "云璟 Yun Jing", transport: "酒店↔餐厅 · 2 辆商务车", tags:["晚餐"], img: IMAGES.yunjing, map: mapEmbed('云璟 深圳') }
        ]
      },
      {
        date: "2026-03-21",
        label: "Day 2 · 深圳挥杆",
        summary: "隐秀高尔夫 + 足浴 + 融苑 + 送程",
        cover: IMAGES.xiaoxiu_golf,
        items: [
          { time: "上午", title: "酒店↔隐秀高尔夫", transport: "2 辆商务车，12人", note: "Mr Yong、Mary、Datuk Richard、Datin Richard、Datuk Lim、Datin Lim、Hao Ge、Mrs. Li、Moli、Moga、Mark、Mini", tags:["高尔夫"], img: IMAGES.xiaoxiu_golf, map: mapEmbed('隐秀高尔夫 深圳') },
          { time: "下午", title: "球场→足浴→融苑→酒店", transport: "3 辆商务车", tags:["休闲","餐饮"], img: IMAGES.rongyuan, map: mapEmbed('融苑 深圳') },
          { time: "送程", title: "Datuk Richard、Datin Richard", transport: "1 辆商务车", tags:["送机"] }
        ]
      },
      {
        date: "2026-03-22",
        label: "Day 3 · 转场广州 | 挥杆+童梦抵达",
        summary: "海逸挥杆 → 广州；童梦抵达；樾宴晚餐",
        cover: IMAGES.haiyi_golf,
        items: [
          { time: "上午", title: "海逸高尔夫 → 广州香格里拉", transport: "2 辆商务车，7人", note: "Mr Yong、Mary、Datuk Lim、Datin Lim、Hao Ge、Mrs. Li、Moli", tags:["高尔夫"], img: IMAGES.haiyi_golf },
          { time: "抵达", title: "童梦抵达 MH376 接机", transport: "3 辆商务车，11人", note: "Andrew、Chris、Irene、Natalia、Mini、Moga、Mary、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)、Moge、Mini", tags:["接机"], img: IMAGES.airport, map: mapEmbed('广州白云机场') },
          { time: "晚餐", title: "二沙岛 樾宴", transport: "酒店↔餐厅 · 3 辆商务车，17人", tags:["晚餐"], img: IMAGES.yueyan, map: mapEmbed('樾宴 二沙岛') }
        ]
      },
      {
        date: "2026-03-23",
        label: "Day 4 · 童梦 | 商务",
        summary: "长隆动物园/大马戏；商务考察",
        cover: IMAGES.changlong_zoo,
        items: [
          { time: "全天", title: "长隆野生动物园 / 大马戏", transport: "2 辆商务车，12人", note: "Andrew、Chris、Irene、Natalia、Mini、Moga、Mary、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)", tags:["亲子","演出"], img: IMAGES.changlong_circus, map: mapEmbed('长隆野生动物园') },
          { time: "商务", title: "商务考察", transport: "1 辆商务车，4人", note: "Mr Yong、Hao Ge、Mrs. Li、Moli", tags:["商务"] }
        ]
      },
      {
        date: "2026-03-24",
        label: "Day 5 · 童梦+挥杆+接机",
        summary: "科学中心&韵轩；佛山球场；接机 Ben",
        cover: IMAGES.science,
        items: [
          { time: "童梦", title: "酒店→广东科学中心→康莱德韵轩", transport: "2 辆商务车，11人", note: "Andrew、Chris、Irene、Natalia、Mini、Moga、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)", tags:["亲子","餐饮"], img: IMAGES.science, map: mapEmbed('广东科学中心') },
          { time: "挥杆", title: "酒店→佛山高尔夫→康莱德韵轩", transport: "2 辆商务车，7人", note: "Mr Yong、Mary、Datuk Lim、Datin Lim、Hao Ge、Mrs. Li、Moli", tags:["高尔夫"], img: IMAGES.foshan_golf, map: mapEmbed('佛山高尔夫球会') },
          { time: "接机", title: "MH376 Ben 接机", transport: "1 辆商务车，1人", tags:["接机"], img: IMAGES.airport }
        ]
      },
      {
        date: "2026-03-25",
        label: "Day 6 · 童梦+商务",
        summary: "极地海洋世界 / 君悦空中花园；天河商超考察",
        cover: IMAGES.aquarium,
        items: [
          { time: "童梦", title: "酒店→正佳极地海洋世界→君悦空中花园", transport: "2 辆商务车，11人", note: "Andrew、Chris、Irene、Natalia、Mini、Moga、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)", tags:["亲子"], img: IMAGES.aquarium, map: mapEmbed('正佳极地海洋世界') },
          { time: "商务", title: "天河商超考察→君悦空中花园", transport: "2 辆商务车，8人", note: "Mr Yong、Mary、Datuk Lim、Datin Lim、Ben、Hao Ge、Mrs. Li、Moli", tags:["商务"], map: mapEmbed('天河城') }
        ]
      },
      {
        date: "2026-03-26",
        label: "Day 7 · 童梦+商务+送机",
        summary: "广东省博物馆；送机；商务考察 夏宫",
        cover: IMAGES.museum,
        items: [
          { time: "童梦", title: "酒店→广东省博物馆→夏宫", transport: "2 辆商务车，11人", note: "Andrew、Chris、Irene、Natalia、Mini、Moga、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)", tags:["亲子","博物馆"], img: IMAGES.museum, map: mapEmbed('广东省博物馆') },
          { time: "送机", title: "Datuk Lim 夫妻 送机", transport: "1 辆商务车，2人", tags:["送机"], img: IMAGES.baiyun_airport, map: mapEmbed('广州白云国际机场') },
          { time: "商务", title: "商务考察→夏宫", transport: "1 辆商务车，6人", note: "Mr Yong、Mary、Ben、Hao Ge、Mrs. Li、Moli", tags:["商务","餐饮"], img: IMAGES.summer_palace, map: mapEmbed('夏宫 广州') }
        ]
      },
      {
        date: "2026-03-27",
        label: "Day 8 · 广州→返程",
        summary: "酒店→白云机场返程 17人",
        cover: IMAGES.baiyun_airport,
        items: [
          { time: "送机", title: "酒店→白云机场", transport: "4 辆商务车，17人", note: "Andrew、Chris、Irene、Natalia、Mini、Moga、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)、Mr Yong、Mary、Ben、Hao Ge、Mrs. Li、Moli", tags:["送机"], img: IMAGES.baiyun_airport, map: mapEmbed('广州白云国际机场') }
        ]
      }
    ];

    const daysEl = document.getElementById('days');
    const navEl = document.getElementById('dayNav');

    function toggleMap(mapEl) {
      if (!mapEl) return;
      const shown = mapEl.style.display === 'block';
      mapEl.style.display = shown ? 'none' : 'block';
    }

    function render() {
      schedule.forEach((day, idx) => {
        const dayId = `day-${idx}`;
        const chip = document.createElement('button');
        chip.className = 'chip' + (idx === 0 ? ' active' : '');
        chip.textContent = day.label || day.date;
        chip.onclick = () => {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          document.getElementById(dayId).scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        navEl.appendChild(chip);

        const wrap = document.createElement('section');
        wrap.className = 'day';
        wrap.id = dayId;

        const header = document.createElement('div');
        header.className = 'day-header';
        header.innerHTML = `<div><div class="day-title">${day.label || day.date}</div><div class="day-date">${day.date}</div></div><div class="day-meta">${day.summary || ''}</div>`;
        wrap.appendChild(header);

        if (day.cover) {
          const imgBox = document.createElement('div');
          imgBox.className = 'img-wrap';
          imgBox.innerHTML = `<img src="${day.cover}" alt="${day.label}" loading="lazy" />`;
          wrap.appendChild(imgBox);
        }

        const grid = document.createElement('div');
        grid.className = 'grid-items';

        (day.items || []).forEach(item => {
          const card = document.createElement('div');
          card.className = 'item';
          card.innerHTML = `
            <div class="time">${item.time || ''}</div>
            <div class="title">${item.title || ''}</div>
            <div class="meta">${item.location ? '📍 ' + item.location : ''} ${item.transport ? '<span class="tag">交通</span>' + item.transport : ''}</div>
            ${item.tags ? `<div class="meta">${item.tags.map(t => `<span class='tag'>${t}</span>`).join('')}</div>` : ''}
            ${item.desc ? `<div class="desc">${item.desc}</div>` : ''}
            ${item.note ? `<div class="desc">${item.note}</div>` : ''}
            ${item.review ? `<div class="desc"><strong>点评：</strong>${item.review}</div>` : ''}
            ${item.rating ? `<div class="meta">评分 <span class="rating">${item.rating.toFixed ? item.rating.toFixed(1) : item.rating}/5</span></div>` : ''}
          `;

          if (item.img) {
            const thumb = document.createElement('div');
            thumb.className = 'thumb';
            thumb.innerHTML = `<img src="${item.img}" loading="lazy" alt="${item.title}" />`;
            card.appendChild(thumb);
          }

          const actions = document.createElement('div');
          actions.className = 'actions';
          let mapFrame;
          if (item.map) {
            const btn = document.createElement('a');
            btn.className = 'btn-link';
            btn.href = item.map;
            btn.target = '_blank';
            btn.rel = 'noopener noreferrer';
            btn.textContent = '地图';
            actions.appendChild(btn);

            mapFrame = document.createElement('div');
            mapFrame.className = 'map-frame';
            mapFrame.innerHTML = `<iframe loading="lazy" src="${item.map}"></iframe>`;

            const toggle = document.createElement('button');
            toggle.className = 'btn-link';
            toggle.textContent = '内嵌地图';
            toggle.type = 'button';
            toggle.onclick = () => toggleMap(mapFrame);
            actions.appendChild(toggle);
          }
          if (actions.childElementCount) card.appendChild(actions);
          if (mapFrame) card.appendChild(mapFrame);

          grid.appendChild(card);
        });

        wrap.appendChild(grid);
        daysEl.appendChild(wrap);
      });
    }

    render();
  </script>
</body>
</html>
