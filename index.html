<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>车辆行程总览 · Malaysia Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f16;
      --panel: #0f1622;
      --panel-2: #111927;
      --ink: #e7edf7;
      --muted: #9ab0c8;
      --line: rgba(255,255,255,0.08);
      --accent: #ff6b35;
      --accent-2: #2bd4c2;
      --shadow: 0 18px 50px rgba(0,0,0,0.55);
      --radius-lg: 20px;
      --radius-sm: 12px;
      --glass: blur(16px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'IBM Plex Sans', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,107,53,0.12), transparent 34%),
        radial-gradient(circle at 82% 10%, rgba(43,212,194,0.14), transparent 36%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06), transparent 40%),
        var(--bg);
      color: var(--ink);
      line-height: 1.65;
      padding: 18px;
      max-width: 1200px;
      margin-inline: auto;
      position: relative;
      overflow-x: hidden;
    }
    .grain { position: fixed; inset: 0; pointer-events: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160"><filter id="n" x="0" y="0"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="160" height="160" filter="url(%23n)" opacity="0.16"/></svg>'); opacity: 0.5; mix-blend-mode: soft-light; }
    header { position: sticky; top: 0; z-index: 10; backdrop-filter: var(--glass); background: color-mix(in srgb, var(--bg) 86%, transparent); border-bottom: 1px solid var(--line); padding: 14px 0 10px; margin-bottom: 12px; }
    .hero { background: linear-gradient(120deg, #131c2b, #0f1622 40%, #0b0f16); border: 1px solid var(--line); color: #fff; padding: 22px 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow); display: grid; gap: 12px; position: relative; overflow: hidden; }
    .hero::after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 10% 20%, rgba(255,107,53,0.22), transparent 40%), radial-gradient(circle at 80% 10%, rgba(43,212,194,0.18), transparent 38%); pointer-events: none; }
    .hero h1 { margin: 0; font-family: 'Archivo', sans-serif; letter-spacing: 0.6px; font-size: 1.5rem; position: relative; z-index: 1; }
    .hero p { margin: 0; color: rgba(255,255,255,0.86); position: relative; z-index: 1; }
    .legend { color: rgba(255,255,255,0.72); font-size: 0.92rem; }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; position: relative; z-index: 1; }
    .stat { padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); display: grid; gap: 2px; min-width: 140px; }
    .stat-label { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
    .stat-value { font-family: 'Archivo', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .nav { display: flex; gap: 8px; overflow-x: auto; padding: 10px 2px 6px 0; scrollbar-width: thin; margin-top: 6px; position: relative; z-index: 1; }
    .chip { border: 1px solid var(--line); padding: 8px 12px; border-radius: 12px; background: var(--panel-2); color: var(--ink); white-space: nowrap; box-shadow: 0 12px 30px rgba(0,0,0,0.25); cursor: pointer; transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease; }
    .chip:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .chip.active { border-color: var(--accent); color: var(--accent); font-weight: 700; }

    main { margin-top: 14px; display: grid; gap: 14px; }
    .day { background: var(--panel); border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--line); box-shadow: var(--shadow); display: grid; gap: 12px; position: relative; overflow: hidden; }
    .day::after { content: ""; position: absolute; inset: 0; pointer-events: none; background: linear-gradient(135deg, transparent 55%, rgba(255,107,53,0.07)); }
    .day-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .day-title { margin: 0; font-size: 1.05rem; font-weight: 800; font-family: 'Archivo', sans-serif; letter-spacing: 0.2px; }
    .day-date { color: var(--muted); font-weight: 600; }
    .day-meta { color: var(--muted); font-size: 0.95rem; }

    .bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; }
    .pill { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; background: var(--panel-2); display: grid; gap: 4px; }
    .pill-label { color: var(--muted); font-size: 0.9rem; }
    .pill-value { font-weight: 700; color: var(--accent); font-size: 1.05rem; }

    .grid-items { display: grid; gap: 10px; }
    @media (min-width: 820px) { .grid-items { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); } }

    .item { border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px; background: color-mix(in srgb, var(--panel) 88%, rgba(255,107,53,0.05) 12%); display: grid; gap: 8px; position: relative; overflow: hidden; }
    .item::after { content: ""; position: absolute; inset: 0; background: linear-gradient(140deg, transparent 60%, rgba(43,212,194,0.08)); pointer-events: none; }
    .time { font-weight: 800; color: var(--accent); font-size: 0.95rem; letter-spacing: 0.1px; }
    .title { font-size: 1rem; font-weight: 800; margin: 0; }
    .meta { color: var(--muted); font-size: 0.94rem; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .tag { display: inline-flex; align-items: center; gap: 6px; background: color-mix(in srgb, var(--accent) 18%, var(--panel) 82%); color: var(--accent); padding: 4px 8px; border-radius: 10px; font-size: 0.82rem; font-weight: 700; }
    .desc { color: var(--ink); font-size: 0.94rem; }
    .count { display: inline-flex; align-items: center; gap: 6px; background: color-mix(in srgb, var(--accent-2) 18%, var(--panel) 82%); color: var(--accent-2); padding: 4px 8px; border-radius: 10px; font-weight: 800; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .btn-link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 10px; background: color-mix(in srgb, var(--accent) 12%, var(--panel) 88%); color: var(--accent); border: 1px solid var(--line); text-decoration: none; font-weight: 800; transition: transform 0.12s ease; }
    .btn-link:hover { transform: translateY(-1px); }
    .map-frame { margin-top: 8px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; display: none; }
    .map-frame iframe { width: 100%; height: 220px; border: none; display: block; }

    .people { color: var(--muted); font-size: 0.9rem; }
    .people strong { color: var(--ink); font-weight: 700; }
  </style>
</head>
<body>
  <div class="grain"></div>
  <header>
    <div class="hero">
      <div>
        <h1>车辆行程总览 · Malaysia Group</h1>
        <p>3/20 - 3/27 · 聚焦车辆/人数/动线 · 广深穗</p>
        <p class="legend">快速查看每日车辆数量、乘车人名单、路线。顶部标签跳转对应日期。</p>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">总天数</div>
          <div class="stat-value">8</div>
        </div>
        <div class="stat">
          <div class="stat-label">最高单日车辆</div>
          <div class="stat-value">5 辆</div>
        </div>
        <div class="stat">
          <div class="stat-label">主要分组</div>
          <div class="stat-value">挥杆 / 童梦 / 商务</div>
        </div>
      </div>
      <div class="nav" id="dayNav"></div>
    </div>
  </header>

  <main id="days"></main>

  <script>
    const q = encodeURIComponent;
    const mapEmbed = place => `https://www.google.com/maps?q=${q(place)}&output=embed`;

    const schedule = [
      {
        date: "2026-03-20",
        label: "Day 1 · 广州→深圳",
        summary: "MH376 抵达，转场南山香格里拉，云璟晚餐",
        totalVehicles: 2,
        items: [
          { time: "抵达", title: "MH376 抵达广州→深圳", vehicles: 2, paxCount: 12, pax: "Mr Yong、Mary、Datuk Richard、Datin Richard、Datuk Lim、Datin Lim、Hao Ge、Mrs. Li、Moli、Moga、Mark、Mini", note: "2 辆商务车接机并转场酒店", map: mapEmbed('广州白云机场') },
          { time: "晚餐", title: "云璟 Yun Jing（酒店↔餐厅）", vehicles: 2, paxCount: 12, pax: "同上", note: "酒店 ↔ 餐厅 2 辆商务车", map: mapEmbed('云璟 深圳') }
        ]
      },
      {
        date: "2026-03-21",
        label: "Day 2 · 深圳挥杆",
        summary: "隐秀高尔夫 + 足浴/融苑 + 送程",
        totalVehicles: 3,
        items: [
          { time: "上午", title: "酒店↔隐秀高尔夫", vehicles: 2, paxCount: 12, pax: "Mr Yong、Mary、Datuk Richard、Datin Richard、Datuk Lim、Datin Lim、Hao Ge、Mrs. Li、Moli、Moga、Mark、Mini", note: "2 辆商务车" , map: mapEmbed('隐秀高尔夫 深圳') },
          { time: "下午/晚间", title: "球场→足浴→融苑→酒店", vehicles: 3, paxCount: 12, pax: "同上", note: "3 辆商务车串联行程", map: mapEmbed('融苑 深圳') },
          { time: "送程", title: "Datuk Richard、Datin Richard", vehicles: 1, paxCount: 2, pax: "Datuk Richard、Datin Richard", note: "送机 1 辆商务车", map: mapEmbed('深圳机场') }
        ]
      },
      {
        date: "2026-03-22",
        label: "Day 3 · 转场广州 | 抵达童梦",
        summary: "海逸挥杆→广州；童梦抵达；樾宴",
        totalVehicles: 5,
        items: [
          { time: "上午", title: "海逸高尔夫→广州香格里拉", vehicles: 2, paxCount: 7, pax: "Mr Yong、Mary、Datuk Lim、Datin Lim、Hao Ge、Mrs. Li、Moli", note: "2 辆商务车" , map: mapEmbed('东莞 海逸高尔夫') },
          { time: "抵达", title: "童梦抵达 MH376 接机", vehicles: 3, paxCount: 11, pax: "Andrew、Chris、Irene、Natalia、Mini、Moga、Mary、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)、Moge、Mini", note: "3 辆商务车接机" , map: mapEmbed('广州白云机场') },
          { time: "晚餐", title: "二沙岛 樾宴（酒店↔餐厅）", vehicles: 3, paxCount: 17, pax: "全员", note: "3 辆商务车" , map: mapEmbed('樾宴 二沙岛') }
        ]
      },
      {
        date: "2026-03-23",
        label: "Day 4 · 童梦 | 商务",
        summary: "长隆野生动物园/大马戏；商务考察",
        totalVehicles: 3,
        items: [
          { time: "全天", title: "长隆野生动物园 / 大马戏", vehicles: 2, paxCount: 12, pax: "Andrew、Chris、Irene、Natalia、Mini、Moga、Mary、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)", note: "2 辆商务车" , map: mapEmbed('长隆野生动物园') },
          { time: "商务", title: "商务考察", vehicles: 1, paxCount: 4, pax: "Mr Yong、Hao Ge、Mrs. Li、Moli", note: "1 辆商务车" }
        ]
      },
      {
        date: "2026-03-24",
        label: "Day 5 · 童梦+挥杆+接机",
        summary: "科学中心 & 佛山挥杆；接机 Ben",
        totalVehicles: 4,
        items: [
          { time: "童梦", title: "酒店→广东科学中心→康莱德韵轩", vehicles: 2, paxCount: 11, pax: "Andrew、Chris、Irene、Natalia、Mini、Moga、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)", note: "2 辆商务车" , map: mapEmbed('广东科学中心') },
          { time: "挥杆", title: "酒店→佛山高尔夫→康莱德韵轩", vehicles: 2, paxCount: 7, pax: "Mr Yong、Mary、Datuk Lim、Datin Lim、Hao Ge、Mrs. Li、Moli", note: "2 辆商务车" , map: mapEmbed('佛山高尔夫球会') },
          { time: "接机", title: "MH376 Ben 接机", vehicles: 1, paxCount: 1, pax: "Ben", note: "1 辆商务车" , map: mapEmbed('广州白云机场') }
        ]
      },
      {
        date: "2026-03-25",
        label: "Day 6 · 童梦+商务",
        summary: "正佳极地海洋世界；天河商超考察",
        totalVehicles: 2,
        items: [
          { time: "童梦", title: "酒店→正佳极地海洋世界→君悦空中花园", vehicles: 2, paxCount: 11, pax: "Andrew、Chris、Irene、Natalia、Mini、Moga、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)", note: "2 辆商务车" , map: mapEmbed('正佳极地海洋世界') },
          { time: "商务", title: "天河商超考察→君悦空中花园", vehicles: 2, paxCount: 8, pax: "Mr Yong、Mary、Datuk Lim、Datin Lim、Ben、Hao Ge、Mrs. Li、Moli", note: "2 辆商务车" , map: mapEmbed('天河城') }
        ]
      },
      {
        date: "2026-03-26",
        label: "Day 7 · 童梦+商务+送机",
        summary: "广东省博物馆；送机；夏宫商务餐",
        totalVehicles: 3,
        items: [
          { time: "童梦", title: "酒店→广东省博物馆→夏宫", vehicles: 2, paxCount: 11, pax: "Andrew、Chris、Irene、Natalia、Mini、Moga、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)", note: "2 辆商务车" , map: mapEmbed('广东省博物馆') },
          { time: "送机", title: "Datuk Lim 夫妻 送机", vehicles: 1, paxCount: 2, pax: "Datuk Lim、Datin Lim", note: "1 辆商务车" , map: mapEmbed('广州白云机场') },
          { time: "商务", title: "商务考察→夏宫", vehicles: 1, paxCount: 6, pax: "Mr Yong、Mary、Ben、Hao Ge、Mrs. Li、Moli", note: "1 辆商务车" , map: mapEmbed('夏宫 广州') }
        ]
      },
      {
        date: "2026-03-27",
        label: "Day 8 · 广州→返程",
        summary: "全员返程 白云机场",
        totalVehicles: 4,
        items: [
          { time: "送机", title: "酒店→白云机场 返程", vehicles: 4, paxCount: 17, pax: "Andrew、Chris、Irene、Natalia、Mini、Moga、Angelina(12)、Alexa(10)、Aurora(5)、Jed(8)、Archer(2-Ben)、Mr Yong、Mary、Ben、Hao Ge、Mrs. Li、Moli", note: "4 辆商务车" , map: mapEmbed('广州白云机场') }
        ]
      }
    ];

    const daysEl = document.getElementById('days');
    const navEl = document.getElementById('dayNav');

    function toggleMap(mapEl) {
      if (!mapEl) return;
      const shown = mapEl.style.display === 'block';
      mapEl.style.display = shown ? 'none' : 'block';
    }

    function render() {
      schedule.forEach((day, idx) => {
        const dayId = `day-${idx}`;
        const chip = document.createElement('button');
        chip.className = 'chip' + (idx === 0 ? ' active' : '');
        chip.textContent = day.label || day.date;
        chip.onclick = () => {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          document.getElementById(dayId).scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        navEl.appendChild(chip);

        const wrap = document.createElement('section');
        wrap.className = 'day';
        wrap.id = dayId;

        const header = document.createElement('div');
        header.className = 'day-header';
        header.innerHTML = `<div><div class="day-title">${day.label || day.date}</div><div class="day-date">${day.date}</div></div><div class="day-meta">${day.summary || ''}</div>`;
        wrap.appendChild(header);

        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.innerHTML = `
          <div class="pill"><div class="pill-label">当日车辆</div><div class="pill-value">${day.totalVehicles || '-'} 辆</div></div>
          <div class="pill"><div class="pill-label">行程段数</div><div class="pill-value">${day.items?.length || 0} 段</div></div>
        `;
        wrap.appendChild(bar);

        const grid = document.createElement('div');
        grid.className = 'grid-items';

        (day.items || []).forEach(item => {
          const card = document.createElement('div');
          card.className = 'item';
          card.innerHTML = `
            <div class="time">${item.time || ''}</div>
            <div class="title">${item.title || ''}</div>
            <div class="meta">${item.vehicles ? `<span class='tag'>${item.vehicles} 辆商务车</span>` : ''} ${item.paxCount ? `<span class='count'>${item.paxCount} 人</span>` : ''}</div>
            ${item.note ? `<div class="desc">${item.note}</div>` : ''}
            ${item.pax ? `<div class="people"><strong>人员：</strong>${item.pax}</div>` : ''}
          `;

          const actions = document.createElement('div');
          actions.className = 'actions';
          let mapFrame;
          if (item.map) {
            const btn = document.createElement('a');
            btn.className = 'btn-link';
            btn.href = item.map;
            btn.target = '_blank';
            btn.rel = 'noopener noreferrer';
            btn.textContent = '地图';
            actions.appendChild(btn);

            mapFrame = document.createElement('div');
            mapFrame.className = 'map-frame';
            mapFrame.innerHTML = `<iframe loading="lazy" src="${item.map}"></iframe>`;

            const toggle = document.createElement('button');
            toggle.className = 'btn-link';
            toggle.textContent = '内嵌地图';
            toggle.type = 'button';
            toggle.onclick = () => toggleMap(mapFrame);
            actions.appendChild(toggle);
          }
          if (actions.childElementCount) card.appendChild(actions);
          if (mapFrame) card.appendChild(mapFrame);

          grid.appendChild(card);
        });

        wrap.appendChild(grid);
        daysEl.appendChild(wrap);
      });
    }

    render();
  </script>
</body>
</html>
