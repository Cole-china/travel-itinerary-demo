<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>行程日历 Demo</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --card: #fff;
      --text: #1f2933;
      --sub: #52606d;
      --accent: #2563eb;
      --muted: #e5e7eb;
      --shadow: 0 8px 28px rgba(15, 23, 42, 0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --card: #0f172a;
        --text: #e5e7eb;
        --sub: #9ca3af;
        --muted: #1f2937;
        --shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Display", "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 16px;
      max-width: 960px;
      margin-inline: auto;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding-bottom: 12px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--muted);
    }
    h1 { margin: 0 0 8px; font-size: 1.4rem; }
    .nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 6px 2px 6px 0;
      scrollbar-width: thin;
    }
    .chip {
      border: 1px solid var(--muted);
      padding: 6px 10px;
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }
    .chip:hover { transform: translateY(-2px); }
    .chip.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }

    .day {
      background: var(--card);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .day h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }
    .day h2 small { color: var(--sub); font-weight: 500; }
    .items { display: flex; flex-direction: column; gap: 10px; }
    .item {
      border: 1px solid var(--muted);
      border-radius: 10px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--card) 90%, var(--accent) 10%);
    }
    .time { font-weight: 700; color: var(--accent); }
    .title { font-size: 1rem; margin: 2px 0; }
    .meta { color: var(--sub); font-size: 0.92rem; }
    .tag {
      display: inline-block;
      background: color-mix(in srgb, var(--accent) 18%, var(--card) 82%);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.82rem;
      margin-right: 6px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    @media (min-width: 720px) {
      body { padding: 24px; }
      .items { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>旅行日程 Demo</h1>
    <div class="nav" id="dayNav"></div>
  </header>
  <main id="days"></main>

  <script>
    const schedule = [

          { time: "13:35-16:25", title: "前往深圳南山香格里拉酒店", transport: "车程约1小时50分", note: "抵达酒店 16:25" },
          { time: "18:30", title: "晚餐：云璟 Yun Jing", transport: "酒店 → 餐厅 车程约18分钟" }
        ]
      },
      {

          { time: "12:30", title: "午餐", location: "球场内用餐" },
          { time: "15:00", title: "足浴", location: "康悦故事·足道奢华馆", transport: "球场→足浴约1小时05分" },
          { time: "18:30", title: "晚餐：融苑·二十四节气菜（南山）", transport: "足浴→餐厅约18分钟" }
        ]
      },
      {

        label: "Day 3 · 转场广州｜挥杆+花城童梦抵达",
        items: [
          { time: "09:00", title: "东莞 海逸高尔夫 18洞（挥杆组）", transport: "酒店→球场约1小时11分", note: "午餐：球场内" },
          { time: "14:30", title: "东莞→广州", transport: "车程约1小时25分" },
          { time: "09:25-13:35", title: "花城童梦组抵达广州 MH376", note: "3辆商务车接机；接机：Moga、Mini" },
          { time: "16:25", title: "抵达广州香格里拉酒店", transport: "车程约50分钟" },
          { time: "18:30", title: "晚餐：樾宴餐厅（二沙岛）", transport: "酒店→餐厅约26分钟" }
        ]
      },
      {
        date: "2026-03-23",
        label: "Day 4 · 广州｜花城童梦 长隆一日",
        items: [
          { time: "08:45", title: "出发长隆野生动物园（自驾）", note: "争取09:30前抵达" },
          { time: "12:30", title: "午餐：园内动物主题餐厅" },

        ]
      },
      {

          { time: "15:00", title: "童梦：前往珠江夜游（天字码头）", transport: "约1小时05分" },
          { time: "16:00", title: "童梦：珠江夜游", note: "天字码头" },
          { time: "18:00", title: "童梦：晚餐 康莱德韵轩中餐厅" },
          { time: "09:15-09:30", title: "挥杆：佛山高尔夫球会 开球", transport: "酒店→球场约58分钟", note: "午餐：球场内" },
          { time: "15:00", title: "挥杆：足浴+永庆坊闲逛" },
          { time: "19:00", title: "挥杆：晚餐 康莱德韵轩中餐厅" }
        ]
      },
      {
        date: "2026-03-25",
        label: "Day 6 · 广州｜童梦+商务",
        items: [
          { time: "10:00", title: "童梦：广东博物馆", transport: "酒店→约21分钟", note: "早餐 08:00-10:00" },
          { time: "13:00", title: "童梦：午餐", note: "待安排" },
          { time: "13:30-18:00", title: "童梦：永庆坊闲逛" },
          { time: "19:00", title: "童梦：晚餐 炳胜私厨（中达旗舰店）" },
          { time: "09:30", title: "商务：天河区商超考察", note: "S001 天河城；S002 正佳广场；S003 天环广场；S004 太古汇" },
          { time: "13:00", title: "商务：午餐 周边安排" },
          { time: "19:00", title: "商务：晚餐 炳胜私厨（中达旗舰店）" }
        ]
      },
      {
        date: "2026-03-26",
        label: "Day 7 · 广州｜童梦+商务+送机",
        items: [
          { time: "10:30-12:00", title: "童梦：正佳企鹅冰雪世界", transport: "酒店→约26分钟" },
          { time: "13:00", title: "童梦：午餐 正佳内" },
          { time: "13:30-18:00", title: "童梦：正佳极地海洋世界 + 美人鱼表演" },
          { time: "19:00", title: "童梦：晚餐 白天鹅西关粤中餐厅" },
          { time: "11:00", title: "商务：送机 Datuk Lim 夫妻", transport: "酒店→白云机场约50分钟" },
          { time: "10:00-17:00", title: "商务：企业考察", note: "E001 欧定服饰；E002 汇美时尚；E003 哥弟服饰研发；E004 星际熊文创" },
          { time: "19:00", title: "商务：晚餐 白天鹅西关粤中餐厅" }
        ]
      },
      {
        date: "2026-03-27",
        label: "Day 8 · 广州→马来西亚 返程",
        items: [
          { time: "08:00-10:00", title: "早餐" },
          { time: "11:00", title: "出发前往广州白云国际机场", transport: "车程约50分钟" },
          { time: "送机团队", title: "Moli、Hao Ge、Mrs. Li、Moga、Mini", note: "商务+童梦 共17人返程" }
        ]
      }
    ];

    const daysEl = document.getElementById('days');
    const navEl = document.getElementById('dayNav');

    function render() {
      schedule.forEach((day, idx) => {
        const dayId = `day-${idx}`;
        // nav chip
        const chip = document.createElement('button');
        chip.className = 'chip' + (idx === 0 ? ' active' : '');
        chip.textContent = day.label || day.date;
        chip.onclick = () => {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          document.getElementById(dayId).scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        navEl.appendChild(chip);

        // day card
        const wrap = document.createElement('section');
        wrap.className = 'day';
        wrap.id = dayId;
        wrap.innerHTML = `<h2>${day.label || day.date} <small>${day.date}</small></h2>`;
        const itemsEl = document.createElement('div');
        itemsEl.className = 'items';
        (day.items || []).forEach(item => {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `
            <div class="time">${item.time || ''}</div>
            <div class="title">${item.title || ''}</div>
            <div class="meta">${item.location ? '📍 ' + item.location : ''}</div>
            <div class="meta">${item.transport ? '<span class="tag">交通</span>' + item.transport : ''}</div>
            <div class="meta">${item.note || ''}</div>
          `;
          itemsEl.appendChild(div);
        });
        wrap.appendChild(itemsEl);
        daysEl.appendChild(wrap);
      });
    }

    render();
  </script>
</body>
</html>
